<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Expense Filter</title>

    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f6f8;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h3>Expense Filter</h3>

    <!-- Hidden chat_id -->
    <input type="hidden" id="chat_id">

    <label>Filter Type</label>
    <select id="filter_type" onchange="handleChange()">
        <option value="today">Today</option>
        <option value="date_range">Date Range</option>
        <option value="month">Single Month</option>
        <option value="month_range">Month Range</option>
    </select>

    <!-- Date Range -->
    <div id="date_range" class="hidden">
        <input type="date" id="from_date">
        <input type="date" id="to_date">
    </div>

    <!-- Single Month -->
    <div id="month_single" class="hidden">
        <input type="number" id="single_month" min="1" max="12" placeholder="Month (1-12)">
    </div>

    <!-- Month Range -->
    <div id="month_range" class="hidden">
        <input type="number" id="from_month" min="1" max="12" placeholder="From Month">
        <input type="number" id="to_month" min="1" max="12" placeholder="To Month">
    </div>

    <button onclick="submitData()">Submit</button>
</div>

<script>
const tg = window.Telegram.WebApp;

// Expand to full screen
tg.expand();

// Get user info
const user = tg.initDataUnsafe?.user;

if (user) {
    document.getElementById("chat_id").value = user.id;
} else {
    alert("Open this inside Telegram!");
}

// Handle UI switching
function handleChange() {
    const type = document.getElementById("filter_type").value;

    document.getElementById("date_range").classList.add("hidden");
    document.getElementById("month_single").classList.add("hidden");
    document.getElementById("month_range").classList.add("hidden");

    if (type === "date_range") {
        document.getElementById("date_range").classList.remove("hidden");
    }
    else if (type === "month") {
        document.getElementById("month_single").classList.remove("hidden");
    }
    else if (type === "month_range") {
        document.getElementById("month_range").classList.remove("hidden");
    }
}

// Submit data
function submitData() {
    const data = {
        chat_id: parseInt(document.getElementById("chat_id").value),
        today: null,
        from_date: null,
        to_date: null,
        from_month: null,
        to_month: null
    };

    const type = document.getElementById("filter_type").value;

    if (type === "today") {
        data.today = new Date().toISOString();
    }
    else if (type === "date_range") {
        data.from_date = document.getElementById("from_date").value;
        data.to_date = document.getElementById("to_date").value;
    }
    else if (type === "month") {
        data.from_month = parseInt(document.getElementById("single_month").value);
    }
    else if (type === "month_range") {
        data.from_month = parseInt(document.getElementById("from_month").value);
        data.to_month = parseInt(document.getElementById("to_month").value);
    }

    console.log("Sending:", data);

    // 🔥 Send to backend
    fetch("https://unvigilantly-unvacillating-candance.ngrok-free.dev/telegram/web/expense", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        alert("Success");
        tg.close();  // close webapp
    })
    .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
