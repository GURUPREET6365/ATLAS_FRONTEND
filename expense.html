<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Filter</title>

    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f6f8;
            color: #1f2937;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            max-width: 560px;
            margin: 0 auto 16px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #d1d5db;
        }
        .hidden {
            display: none;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }
        .status {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #e0f2fe;
            color: #075985;
        }
        .status.error {
            background: #fee2e2;
            color: #b91c1c;
        }
        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .results-header h3 {
            margin: 0;
        }
        .results-count {
            margin: 0;
            color: #6b7280;
            font-size: 14px;
        }
        .expense-item {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 14px;
            background: #f8fafc;
        }
        .expense-item + .expense-item {
            margin-top: 12px;
        }
        .expense-field {
            margin: 0;
            line-height: 1.5;
        }
        .expense-field strong {
            display: inline-block;
            min-width: 104px;
        }
        .empty-state {
            margin: 0;
            padding: 14px;
            border-radius: 10px;
            background: #f8fafc;
            color: #6b7280;
        }
    </style>
</head>

<body>

<div class="card">
    <h3>Expense Filter</h3>

    <!-- Hidden chat_id -->
    <input type="hidden" id="chat_id">

    <label>Filter Type</label>
    <select id="filter_type" onchange="handleChange()">
        <option value="today">Today</option>
        <option value="date_range">Date Range</option>
        <option value="month">Single Month</option>
        <option value="month_range">Month Range</option>
    </select>

    <!-- Date Range -->
    <div id="date_range" class="hidden">
        <input type="date" id="from_date">
        <input type="date" id="to_date">
    </div>

    <!-- Single Month -->
    <div id="month_single" class="hidden">
        <input type="number" id="single_month" min="1" max="12" placeholder="Month (1-12)">
    </div>

    <!-- Month Range -->
    <div id="month_range" class="hidden">
        <input type="number" id="from_month" min="1" max="12" placeholder="From Month">
        <input type="number" id="to_month" min="1" max="12" placeholder="To Month">
    </div>

    <button id="submit_button" onclick="submitData()">Submit</button>
    <p id="status_message" class="status hidden"></p>
</div>

<div id="results_card" class="card hidden">
    <div class="results-header">
        <h3>Expense Results</h3>
        <p id="results_count" class="results-count"></p>
    </div>
    <div id="results_list"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
const resultsCard = document.getElementById("results_card");
const resultsList = document.getElementById("results_list");
const resultsCount = document.getElementById("results_count");
const statusMessage = document.getElementById("status_message");
const submitButton = document.getElementById("submit_button");

// Expand to full screen
tg.expand();

// Get user info
const user = tg.initDataUnsafe?.user;

if (user) {
    document.getElementById("chat_id").value = user.id;
} else {
    alert("Open this inside Telegram!");
}

// Handle UI switching
function handleChange() {
    const type = document.getElementById("filter_type").value;

    document.getElementById("date_range").classList.add("hidden");
    document.getElementById("month_single").classList.add("hidden");
    document.getElementById("month_range").classList.add("hidden");

    if (type === "date_range") {
        document.getElementById("date_range").classList.remove("hidden");
    }
    else if (type === "month") {
        document.getElementById("month_single").classList.remove("hidden");
    }
    else if (type === "month_range") {
        document.getElementById("month_range").classList.remove("hidden");
    }
}

function setStatus(message, isError = false) {
    if (!message) {
        statusMessage.textContent = "";
        statusMessage.classList.add("hidden");
        statusMessage.classList.remove("error");
        return;
    }

    statusMessage.textContent = message;
    statusMessage.classList.remove("hidden");
    statusMessage.classList.toggle("error", isError);
}

function formatDate(value) {
    if (!value) {
        return "-";
    }

    const date = new Date(value);
    if (Number.isNaN(date.getTime())) {
        return value;
    }

    return date.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
    });
}

function pad(value) {
    return String(value).padStart(2, "0");
}

function getTimezoneOffsetString() {
    const offsetMinutes = -new Date().getTimezoneOffset();
    const sign = offsetMinutes >= 0 ? "+" : "-";
    const absoluteMinutes = Math.abs(offsetMinutes);
    const hours = pad(Math.floor(absoluteMinutes / 60));
    const minutes = pad(absoluteMinutes % 60);

    return `${sign}${hours}:${minutes}`;
}

function formatDateTimeString(dateValue, timeText) {
    return `${dateValue} ${timeText}.000000${getTimezoneOffsetString()}`;
}

function formatLocalDate(date) {
    return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
    ].join("-");
}

function formatCurrentDateTime(date) {
    const microseconds = `${String(date.getMilliseconds()).padStart(3, "0")}000`;
    const timeText = [
        pad(date.getHours()),
        pad(date.getMinutes()),
        pad(date.getSeconds())
    ].join(":");

    return `${formatLocalDate(date)} ${timeText}.${microseconds}${getTimezoneOffsetString()}`;
}

function getMonthBoundaryDate(year, month, isEndDate = false) {
    if (isEndDate) {
        return new Date(year, month, 0);
    }

    return new Date(year, month - 1, 1);
}

function formatMonthBoundary(month, isEndDate = false) {
    if (!Number.isInteger(month) || month < 1 || month > 12) {
        throw new Error("Month must be between 1 and 12.");
    }

    const currentYear = new Date().getFullYear();
    const boundaryDate = getMonthBoundaryDate(currentYear, month, isEndDate);
    const dateText = [
        boundaryDate.getFullYear(),
        pad(boundaryDate.getMonth() + 1),
        pad(boundaryDate.getDate())
    ].join("-");

    return formatDateTimeString(dateText, isEndDate ? "23:59:00" : "00:00:00");
}

function getExpensesFromResponse(response) {
    if (Array.isArray(response)) {
        return response;
    }

    if (!response || typeof response !== "object") {
        return [];
    }

    if (Array.isArray(response.data)) {
        return response.data;
    }

    if (Array.isArray(response.expenses)) {
        return response.expenses;
    }

    if (Array.isArray(response.results)) {
        return response.results;
    }

    if ("amount" in response || "reason" in response || "expense_date" in response || "expenseDate" in response) {
        return [response];
    }

    return [];
}

function createExpenseField(label, value) {
    const field = document.createElement("p");
    field.className = "expense-field";

    const strong = document.createElement("strong");
    strong.textContent = `${label}:`;

    field.appendChild(strong);
    field.append(` ${value ?? "-"}`);

    return field;
}

function createExpenseItem(expense) {
    const item = document.createElement("div");
    item.className = "expense-item";

    const amount = createExpenseField("Amount", expense.amount);
    const reason = createExpenseField("Reason", expense.reason);
    const expenseDate = createExpenseField(
        "Expense Date",
        formatDate(expense.expense_date ?? expense.expenseDate ?? expense.date)
    );

    item.appendChild(amount);
    item.appendChild(reason);
    item.appendChild(expenseDate);

    return item;
}

function renderExpenses(expenses) {
    resultsList.innerHTML = "";
    resultsCard.classList.remove("hidden");
    resultsCount.textContent = `${expenses.length} item${expenses.length === 1 ? "" : "s"}`;

    if (!expenses.length) {
        const emptyState = document.createElement("p");
        emptyState.className = "empty-state";
        emptyState.textContent = "No expenses found for this filter.";
        resultsList.appendChild(emptyState);
        return;
    }

    expenses.forEach(expense => {
        resultsList.appendChild(createExpenseItem(expense));
    });
}

// Submit data
function submitData() {
    const data = {
        chat_id: parseInt(document.getElementById("chat_id").value),
        type: null,
        from_date: null,
        to_date: null,
        from_month: null,
        to_month: null
    };

    const selectedFilterType = document.getElementById("filter_type").value;
    const typeMapping = {
        today: "today",
        date_range: "date_range",
        month: "single_month",
        month_range: "month_range"
    };

    try {
        data.type = typeMapping[selectedFilterType] ?? null;

        if (!data.type) {
            throw new Error("Invalid filter type selected.");
        }

        if (selectedFilterType === "today") {
            const now = new Date();
            const todayDate = formatLocalDate(now);

            data.from_date = formatDateTimeString(todayDate, "00:00:00");
            data.to_date = formatCurrentDateTime(now);
        }
        else if (selectedFilterType === "date_range") {
            const fromDate = document.getElementById("from_date").value;
            const toDate = document.getElementById("to_date").value;

            if (!fromDate || !toDate) {
                throw new Error("Please select both from and to dates.");
            }

            data.from_date = formatDateTimeString(fromDate, "00:00:00");
            data.to_date = formatDateTimeString(toDate, "23:59:00");
        }
        else if (selectedFilterType === "month") {
            const selectedMonth = parseInt(document.getElementById("single_month").value, 10);

            data.from_month = formatMonthBoundary(selectedMonth, false);
            data.to_month = formatMonthBoundary(selectedMonth, true);
        }
        else if (selectedFilterType === "month_range") {
            const fromMonth = parseInt(document.getElementById("from_month").value, 10);
            const toMonth = parseInt(document.getElementById("to_month").value, 10);

            if (!Number.isInteger(fromMonth) || !Number.isInteger(toMonth)) {
                throw new Error("Please select both from and to months.");
            }

            if (fromMonth > toMonth) {
                throw new Error("From month cannot be greater than to month.");
            }

            data.from_month = formatMonthBoundary(fromMonth, false);
            data.to_month = formatMonthBoundary(toMonth, true);
        }
    } catch (error) {
        setStatus(error.message, true);
        return;
    }

    console.log("Sending:", data);
    setStatus("Loading expenses...");
    submitButton.disabled = true;

    fetch("https://unvigilantly-unvacillating-candance.ngrok-free.dev/telegram/web/expense", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(async res => {
        if (!res.ok) {
            throw new Error(`Request failed with status ${res.status}`);
        }

        return res.json();
    })
    .then(res => {
        const expenses = getExpensesFromResponse(res);
        renderExpenses(expenses);
        setStatus("Expenses loaded successfully.");
    })
    .catch(err => {
        console.error("Expense fetch failed:", err);
        setStatus(`Error: ${err.message}`, true);
        resultsCard.classList.add("hidden");
    })
    .finally(() => {
        submitButton.disabled = false;
    });
}
</script>

</body>
</html>
